[project]
name = "axilio"
version = "0.4.0"
description = "Axilio Python SDK — manage workflows, runs, devices, usage, and control devices remotely"
readme = "README.md"
requires-python = ">=3.10"
# Runtime deps. The REST client under src/axilio/ is generated by Fern
# (`fern generate --local`); its runtime needs are httpx + pydantic +
# typing_extensions. websocket-client backs the hand-written device-control
# driver (drivers/), which Fern does not generate. There is no longer a
# generator-managed marker block — Fern's deps are stable and pinned here
# directly.
dependencies = [
    "httpx>=0.21.2",
    "pydantic>=1.9.2",
    "typing_extensions>=4.0.0",
    # Sync WebSocket client for the remote device-control transport (DCP).
    "websocket-client>=1.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-httpx>=0.30.0",
    # Quality tools — pinned versions match the backend repo's Python CI
    # so behaviour is identical across both repos. Bumping here without
    # bumping there will drift.
    "black==25.1.0",
    "ruff==0.12.1",
    "mypy==1.16.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Single regular package — `axilio` is a normal package with its own
# __init__.py (generated by Fern). drivers/, platform/, and _mode.py are
# hand-written and preserved across regen via src/axilio/.fernignore.
[tool.hatch.build.targets.wheel]
packages = ["src/axilio"]
# Fern emits repo-style docs/tests/metadata alongside the package on each
# `fern generate`. They're gitignored (not committed) but reappear when CI
# regenerates before building the wheel — keep them out of the artifact.
exclude = [
    "src/axilio/README.md",
    "src/axilio/CONTRIBUTING.md",
    "src/axilio/reference.md",
    "src/axilio/tests",
    "src/axilio/.fern",
    "src/axilio/argus/README.md",
    "src/axilio/argus/CONTRIBUTING.md",
    "src/axilio/argus/reference.md",
    "src/axilio/argus/tests",
    "src/axilio/argus/.fern",
]

# The sdist is a build/install artifact, not a mirror of the repo. By
# default hatchling sweeps every VCS-tracked file into the sdist — which
# pulls in the raw OpenAPI specs under specs/ (codegen inputs that expose
# the full internal API surface, incl. staging), the test suite, scripts,
# and local tooling configs like .claude/. None of that is needed to build
# or install the package, and the specs must not ship to PyPI now that the
# repo is public. Restrict the sdist to the package source plus the readme;
# pyproject.toml is always included by hatchling.
[tool.hatch.build.targets.sdist]
include = [
    "src/axilio",
    "README.md",
]
exclude = [
    "src/axilio/README.md",
    "src/axilio/CONTRIBUTING.md",
    "src/axilio/reference.md",
    "src/axilio/tests",
    "src/axilio/.fern",
    "src/axilio/argus/README.md",
    "src/axilio/argus/CONTRIBUTING.md",
    "src/axilio/argus/reference.md",
    "src/axilio/argus/tests",
    "src/axilio/argus/.fern",
]

# --- Quality tooling -----------------------------------------------
# The backend repo uses black + ruff + mypy in CI; mirror the exact
# versions and config here so a PR that's clean in one repo is clean
# in the other.
#
# Only hand-written code is linted: drivers/, platform/, _mode.py, and the
# tests. Everything else under src/axilio/ is Fern's mechanical output —
# regenerated wholesale on each deploy, formatted on Fern's own rules.
# Linting it would force taste decisions onto a tool that doesn't share them
# and create noise on every regen PR for zero benefit. CI invokes the tools
# against the hand-written paths explicitly (see .github/workflows/quality.yml);
# the excludes below keep a broad `ruff check src/axilio` honest too.

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]
extend-exclude = '''
/(
    src/axilio/core
    | src/axilio/types
    | src/axilio/api_keys
    | src/axilio/billing
    | src/axilio/devices
    | src/axilio/organizations
    | src/axilio/runs
    | src/axilio/usage
    | src/axilio/user
    | src/axilio/user_settings
    | src/axilio/workflows
    | src/axilio/argus
    | src/axilio/client\.py
    | src/axilio/environment\.py
    | src/axilio/_default_clients\.py
    | src/axilio/__init__\.py
)/?
'''

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "src/axilio/core",
    "src/axilio/types",
    "src/axilio/api_keys",
    "src/axilio/billing",
    "src/axilio/devices",
    "src/axilio/organizations",
    "src/axilio/runs",
    "src/axilio/usage",
    "src/axilio/user",
    "src/axilio/user_settings",
    "src/axilio/workflows",
    "src/axilio/argus",
    "src/axilio/client.py",
    "src/axilio/environment.py",
    "src/axilio/_default_clients.py",
    "src/axilio/__init__.py",
]

[tool.ruff.lint]
# Default Pyflakes (F) + pycodestyle (E) + isort (I) + bugbear (B).
# Match what axilio runs without --select ALL strict mode — the
# strict ruleset is reserved for the backend's stricter modules.
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = []

[tool.mypy]
python_version = "3.10"
strict = false
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
# Generated code lives outside our type contract.
exclude = [
    "src/axilio/core/",
    "src/axilio/types/",
    "src/axilio/api_keys/",
    "src/axilio/billing/",
    "src/axilio/devices/",
    "src/axilio/organizations/",
    "src/axilio/runs/",
    "src/axilio/usage/",
    "src/axilio/user/",
    "src/axilio/user_settings/",
    "src/axilio/workflows/",
    "src/axilio/argus/",
    "src/axilio/client.py",
    "src/axilio/environment.py",
    "src/axilio/_default_clients.py",
]

[[tool.mypy.overrides]]
# Fern's generated modules are followed for type info when our hand-written
# code imports them; don't surface errors from inside that mechanical output.
module = [
    "axilio.core.*",
    "axilio.types.*",
    "axilio.api_keys.*",
    "axilio.billing.*",
    "axilio.devices.*",
    "axilio.organizations.*",
    "axilio.runs.*",
    "axilio.usage.*",
    "axilio.user.*",
    "axilio.user_settings.*",
    "axilio.workflows.*",
    "axilio.client",
    "axilio.environment",
    "axilio._default_clients",
]
ignore_errors = true
ignore_missing_imports = true

[tool.pytest.ini_options]
# Only the repo-level suite; Fern emits its own tests/ inside the package
# which we neither commit nor run.
testpaths = ["tests"]
