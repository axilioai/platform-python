name: SDK Regenerate

# Fires when the API backend publishes a new *production* spec, and
# regenerates the Fern SDK under src/axilio/ from it.
#
# Generation runs `fern generate --local` — the Fern Python generator in a
# Docker container on the CI runner. No Fern account / FERN_TOKEN, no vendor
# dependency: the only inputs are the committed OpenAPI spec and the
# generator version pinned in fern/generators.yml. Hand-written code
# (drivers/, platform/, _mode.py) is preserved across regen via
# src/axilio/.fernignore.
#
# Merging a regen PR does NOT cut a release: the `axilio` package owns its
# own SemVer (independent of the backend spec version), bumped deliberately
# in pyproject.toml. tag-on-merge.yml turns a version bump into a `vX.Y.Z`
# tag; publish.yml ships that tag to PyPI.
#
# Staging dispatches are intentionally ignored: staging may carry endpoints
# prod doesn't have yet, and a staging-driven SDK would give customers types
# for endpoints that 404 in production.
#
# NOTE: argus (vision inference) is not regenerated here yet — its spec shape
# is incompatible with a merged client (see fern/generators.yml). It will get
# its own Fern API + regen job in a follow-up (AXI-1108).

on:
  repository_dispatch:
    # openapi-spec-updated → backend client (src/axilio). The argus-spec-updated
    # dispatch still fires from the backend deploy but has no job here yet; it's
    # a harmless no-op until argus gets its own Fern API.
    types: [openapi-spec-updated]
  # Manual trigger for eyeballing / forcing a regen.
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    name: Regenerate production SDK (Fern)
    # Gate on the production environment so staging dispatches don't regen.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'openapi-spec-updated' &&
       github.event.client_payload.environment == 'production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (Fern CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Fern CLI
        # The launcher resolves the generator/CLI version pinned in
        # fern/fern.config.json; ubuntu-latest ships Docker for --local.
        run: npm install -g fern-api

      - name: Regenerate SDK
        run: fern generate --local --group python-sdk --force --log-level warn

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet src/axilio/; then
            echo "Generated code unchanged; nothing to PR."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected; opening PR."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open regen PR
        if: steps.diff.outputs.changed == 'true'
        # Single reused branch (regen/backend) — successive dispatches update
        # the same PR rather than stacking duplicates. Only the package source
        # is committed; Fern's repo-style byproducts (README/reference/tests/
        # .fern) are gitignored. The regen does NOT bump the SDK version.
        uses: peter-evans/create-pull-request@v6
        env:
          AXILIO_SHA: ${{ github.event.client_payload.axilio_sha || 'manual' }}
          AXILIO_REF: ${{ github.event.client_payload.axilio_ref || 'manual' }}
        with:
          branch: regen/backend
          base: main
          add-paths: |
            src/axilio/**
            specs/production/openapi.json
          title: "chore(sdk): regenerate backend client (Fern)"
          commit-message: |
            chore(sdk): regenerate backend client (Fern)

            Auto-generated by .github/workflows/regen.yml via `fern generate --local`.
            Source: axilio@${{ env.AXILIO_SHA }} (${{ env.AXILIO_REF }})
          body: |
            Auto-generated by the SDK regen pipeline from the backend spec,
            via `fern generate --local` (Fern Python generator in Docker).
            `src/axilio/` has been updated to match.

            | | |
            |---|---|
            | Axilio source SHA | `${{ env.AXILIO_SHA }}` |
            | Axilio source ref | `${{ env.AXILIO_REF }}` |
            | Spec path | `specs/production/openapi.json` |
            | Generator | `fern-python-sdk` (see fern/generators.yml) |

            ## What changed

            The production OpenAPI spec moved since the last regen. Only the
            Fern-generated code changed; hand-written code (drivers/, platform/,
            _mode.py — preserved via src/axilio/.fernignore) did not.

            ## What still needs human attention

            - This PR does **not** bump the SDK version, so merging it alone
              does not publish to PyPI — the change ships with the next version
              bump (bump `version` in `pyproject.toml`). The SDK version is
              independent of the backend.
            - If this regen adds or removes a whole resource group (a new
              backend tag), update the generated-code lint excludes in
              `pyproject.toml` and the `platform.Client` resource passthroughs.
