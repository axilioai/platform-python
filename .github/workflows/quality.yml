name: Quality

# Black + ruff + mypy with versions pinned in pyproject.toml's [dev]
# extras. Versions are kept in sync with the backend repo's Python CI so a
# PR that's clean here is clean there and vice versa — bumping in one place
# without the other will drift.
#
# Only hand-written code is linted: drivers/, platform/, and _mode.py
# (plus the tests). Everything else under src/axilio/ is Fern's mechanical
# output, regenerated wholesale on each backend deploy — any formatting
# opinions we inflict on it get reverted next regen. pyproject.toml also
# excludes the generated tree so a broad invocation stays honest.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Black + Ruff + MyPy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev deps
        run: pip install -e '.[dev]'

      # No --auto-fix in CI; humans run the fixer locally and commit.
      # All three checks run even if an earlier one fails (`if: always()`)
      # so a single CI run surfaces every category at once instead of
      # forcing the contributor to push-fix-push-fix once per tool.

      - name: black --check
        run: black --check src/axilio/platform src/axilio/drivers src/axilio/_mode.py tests

      - name: ruff check
        if: always()
        run: ruff check src/axilio/platform src/axilio/drivers src/axilio/_mode.py tests

      - name: mypy
        if: always()
        run: mypy src/axilio/platform src/axilio/drivers src/axilio/_mode.py tests
